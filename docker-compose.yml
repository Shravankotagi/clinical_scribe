services:
  auth-app:
    build:
      context: ./auth-app
    hostname: auth-app
    ports:
      - "3000:3000"
    env_file:
      - ./auth-app/.env
    environment:
      - OPENSCRIBE_URL=http://localhost:3001
      - BETTER_AUTH_URL=http://localhost:3000
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  openscribe:
    build:
      context: ./frontend
      dockerfile: apps/web/Dockerfile
    hostname: openscribe
    ports:
      - "3001:3001"
    env_file:
      - ./frontend/apps/web/.env.local
    environment:
      - WHISPER_LOCAL_URL=http://transcription:8000/v1/audio/transcriptions
      - WHISPER_LOCAL_TRUSTED_HOSTS=transcription
      - AUTH_APP_URL=http://auth-app:3000
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - transcription
      - auth-app
    restart: unless-stopped

  transcription:
    build:
      context: ./whisper-server
      dockerfile: Dockerfile.assemblyai
    hostname: transcription
    ports:
      - "8002:8000"
    environment:
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  keepalive:
    image: alpine
    command: sh -c "apk add --no-cache curl && while true; do curl -s http://auth-app:3000/api/health > /dev/null 2>&1; sleep 20; done"
    depends_on:
      auth-app:
        condition: service_started
    restart: unless-stopped